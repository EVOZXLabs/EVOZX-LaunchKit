<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVOZX Launch Kit</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>EVOZX Launch Kit</h1>

<p>Create Your Token Project on EVOZ Mainnet</p>

<input
id="project"
placeholder="Project Name">

<input
id="token"
placeholder="Token Name">

<input
id="symbol"
placeholder="Symbol">

<input
id="supply"
placeholder="Supply">

<textarea
id="description"
placeholder="Project Description"></textarea>

<button onclick="generateDocs()">
Generate
</button>

<h2>README</h2>

<textarea id="readme"></textarea>

<h2>WHITEPAPER</h2>

<textarea id="whitepaper"></textarea>

<h2>ROADMAP</h2>

<textarea id="roadmap"></textarea>

<h2>TOKENOMICS</h2>

<textarea id="tokenomics"></textarea>

</div>

<script src="script.js"></script>

</body>
</html>
