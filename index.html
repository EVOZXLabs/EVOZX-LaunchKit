<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>EVOZX Launch Kit v0.5</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>EVOZX Launch Kit v0.5</h1>

<p>Launch Assets + Contract Wizard</p>

<input id="project"
placeholder="Project Name">

<input id="token"
placeholder="Token Name">

<input id="symbol"
placeholder="Symbol">

<input id="supply"
placeholder="Supply">

<textarea id="description"
placeholder="Project Description"></textarea>


<select id="contractType">

<option value="basic">

Basic Token

</option>

<option value="mintable">

Mintable Token

</option>

<option value="burnable">

Burnable Token

</option>

</select>


<button onclick="generateAll()">

Generate Everything

</button>


<section>

<h2>Dashboard Preview</h2>

<div id="dashboard">

<div class="card">

<span>Supply</span>

<h3 id="dSupply">-</h3>

</div>

<div class="card">

<span>Symbol</span>

<h3 id="dSymbol">-</h3>

</div>

<div class="card">

<span>Type</span>

<h3 id="dType">-</h3>

</div>

</div>

</section>


<section>

<h2>Smart Contract</h2>

<textarea id="contract"></textarea>

</section>


<section>

<h2>Website HTML</h2>

<textarea id="website"></textarea>

</section>


<section>

<h2>Logo Prompt</h2>

<textarea id="logo"></textarea>

</section>


<section>

<h2>Metadata JSON</h2>

<textarea id="metadata"></textarea>

</section>

</div>

<script src="script.js"></script>

</body>

</html>
