<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>EVOZX Launch Kit v0.4</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>EVOZX Launch Kit</h1>

<p>Generate complete launch assets</p>

<input id="project"
placeholder="Project Name">

<input id="token"
placeholder="Token Name">

<input id="symbol"
placeholder="Symbol">

<input id="supply"
placeholder="Supply">

<textarea
id="description"
placeholder="Description"></textarea>

<button onclick="generateDocs()">
Generate
</button>

<h2>Landing Page HTML</h2>

<button onclick="copyText('landinghtml')">
Copy
</button>

<button onclick=
"downloadText(
'landinghtml',
'index.html'
)">
Export
</button>

<textarea id="landinghtml"></textarea>


<h2>Landing Page CSS</h2>

<button onclick="copyText('landingcss')">
Copy
</button>

<button onclick=
"downloadText(
'landingcss',
'style.css'
)">
Export
</button>

<textarea id="landingcss"></textarea>


<h2>Preview</h2>

<iframe id="preview"></iframe>

</div>

<script src="script.js"></script>

</body>

</html>
